<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Camera SP - Monitoramento</title>
    <style>
        :root {
            --bg-color: #0a0f1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent: #ffd700; /* Amarelo trânsito */
            --success: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        /* Esquerda: Câmeras */
        .camera-section {
            flex: 2;
            background: #000;
            border-right: 3px solid #222;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Direita: Status */
        .status-section {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .header h1 { font-size: 1.2rem; margin: 0; color: var(--accent); letter-spacing: 1px; }

        .line-card {
            background: var(--card-bg);
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid transparent;
        }

        .line-name { font-weight: bold; font-size: 0.9rem; }
        .line-status { font-size: 0.8rem; font-weight: 500; }

        .verde { color: var(--success); }
        .amarelo { color: var(--warning); }
        .vermelho { color: var(--danger); }

        #timer { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <section class="camera-section">
        <iframe src="https://cameras.cetsp.com.br/View/Cam.aspx"></iframe>
    </section>

    <section class="status-section">
        <div class="header">
            <h1>STATUS OPERACIONAL</h1>
            <span id="timer">Atualizando em 60s</span>
        </div>
        <div id="status-container">Carregando dados...</div>
    </section>
</div>

<script>
    // Usando o AllOrigins como proxy para evitar o erro de CORS
    const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
    const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`;
    
    let timeRemaining = 60;

    async function updateStatus() {
        try {
            const response = await fetch(PROXY_URL);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents); // O AllOrigins retorna o JSON dentro de 'contents'

            const container = document.getElementById('status-container');
            container.innerHTML = '';

            data.data.forEach(category => {
                category.listItem.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'line-card';
                    card.style.borderLeftColor = getLineColor(item.color);

                    const statusClass = item.statusColor === 'verde' ? 'verde' : 'amarelo';
                    
                    card.innerHTML = `
                        <span class="line-name">${item.line}</span>
                        <span class="line-status ${statusClass}">${item.status.toUpperCase()}</span>
                    `;
                    container.appendChild(card);
                });
            });
            timeRemaining = 60;
        } catch (e) {
            document.getElementById('status-container').innerHTML = "Erro ao carregar. Tentando novamente...";
        }
    }

    function getLineColor(color) {
        const colors = {
            'Azul': '#005599', 'Verde': '#008144', 'Vermelha': '#ef4135',
            'Prata': '#96999b', 'Amarela': '#ffce00', 'Lilás': '#a44e9b',
            'TURQUESA': '#00958b', 'CORAL': '#f6821f', 'SAFIRA': '#005599',
            'JADE': '#00a859', 'Diamante': '#919191', 'Esmeralda': '#00a98e', 'Ouro': '#d6a85e'
        };
        return colors[color] || '#888';
    }

    setInterval(() => {
        timeRemaining--;
        document.getElementById('timer').innerText = `Atualizando em ${timeRemaining}s`;
        if (timeRemaining <= 0) updateStatus();
    }, 1000);

    updateStatus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITY CAMERA SP - MODO NEWS 2X</title>
    <style>
        :root {
            --bg-color: #000;
            --accent: #38bdf8;
            --bar-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            overflow: hidden;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        /* BARRA ESTILO NEWS */
        .news-bar {
            height: 70px;
            background: var(--bar-bg);
            display: flex;
            align-items: center;
            border-bottom: 3px solid var(--accent);
            border-top: 3px solid var(--accent);
            z-index: 1000;
        }

        .news-label {
            background: var(--accent);
            color: #000;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 18px;
            white-space: nowrap;
            z-index: 1001;
            text-transform: uppercase;
        }

        marquee {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .marquee-item {
            margin-right: 80px;
            display: inline-block;
            letter-spacing: 1px;
        }

        /* SEÇÃO CENTRAL DAS CÂMERAS */
        .camera-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .iframe-crop-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        .wrapper-zoomable {
            position: absolute;
            left: 0; 
            top: 0;
            width: 100%;
            height: 100%;
            transform-origin: top left;
            transition: transform 0.2s ease;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* CONTROLES DE ZOOM RESTAURADOS */
        .zoom-controls {
            position: absolute;
            bottom: 15px; 
            right: 15px;
            z-index: 2000;
            display: flex; 
            gap: 8px;
            opacity: 0.1; /* Quase invisível para não atrapalhar a live */
            transition: opacity 0.3s;
        }
        .zoom-controls:hover { opacity: 1; }

        .btn-zoom {
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: 900;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="news-bar">
            <div class="news-label">STATUS METRÔ/CPTM</div>
            <marquee scrollamount="10" class="status-marquee">
                Sincronizando dados de transporte...
            </marquee>
        </header>

        <section class="camera-section">
            <div class="iframe-crop-container">
                <div class="zoom-controls">
                    <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
                    <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
                    <button class="btn-zoom" style="font-size: 10px;" onclick="resetZoom()">RST</button>
                </div>
                
                <div class="wrapper-zoomable" id="cam-wrapper">
                    <iframe src="https://transitoaovivo.com/transito-cetsp-2/"></iframe>
                </div>
            </div>
        </section>

        <footer class="news-bar">
            <div class="news-label">INFORMAÇÃO AO VIVO</div>
            <marquee scrollamount="10" class="status-marquee">
                Sincronizando dados de transporte...
            </marquee>
        </footer>
    </div>

    <script>
        let currentZoom = 1.0;
        const wrapper = document.getElementById('cam-wrapper');

        // Função de Zoom
        function changeZoom(delta) {
            currentZoom = Math.max(0.5, Math.min(3.0, currentZoom + delta));
            applyStyles();
        }

        function resetZoom() {
            currentZoom = 1.0;
            applyStyles();
        }

        function applyStyles() {
            wrapper.style.transform = `scale(${currentZoom})`;
            // Ajusta a largura e altura para não sobrar espaço preto ao dar zoom out
            if (currentZoom < 1) {
                wrapper.style.width = (100 / currentZoom) + "%";
                wrapper.style.height = (100 / currentZoom) + "%";
            } else {
                wrapper.style.width = "100%";
                wrapper.style.height = "100%";
            }
        }

        // Lógica do Marquee
        const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
        const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

        async function loadData() {
            try {
                const response = await fetch(PROXY);
                const json = await response.json();
                const marquees = document.querySelectorAll('.status-marquee');
                
                let textStatus = "";

                json.data.forEach(group => {
                    group.listItem.forEach(item => {
                        const status = item.status.toUpperCase();
                        const color = item.status.toLowerCase().includes('normal') ? '🟢' : '🟡';
                        textStatus += `<span class="marquee-item">${color} ${item.line}: ${status}</span>`;
                    });
                });

                marquees.forEach(m => {
                    m.innerHTML = textStatus + textStatus;
                });
            } catch (err) { console.error(err); }
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>

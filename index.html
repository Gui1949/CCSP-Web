<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Camera São Paulo - Live</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #eab308;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        /* LADO ESQUERDO: CAMERA COM CORTE DO CABEÇALHO */
        .camera-section {
            flex: 1.8; 
            border-right: 2px solid #334155;
            background: #000;
            position: relative;
            overflow: hidden; /* Importante para o corte funcionar */
        }

        /* Esta div faz o "crop" do iframe */
        .iframe-wrapper {
            position: absolute;
            top: -155px; /* AQUI: Empurra o cabeçalho da CET para cima */
            left: 0;
            width: 100%;
            height: calc(100% + 155px); /* Compensa o que foi empurrado */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* LADO DIREITO: STATUS */
        .status-section {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .header h1 { font-size: 1.3rem; margin: 0; color: var(--accent); text-transform: uppercase; }

        .line-card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid transparent;
            font-size: 0.9rem;
        }

        .line-name { font-weight: bold; }
        .status-verde { color: var(--success); font-weight: bold; }
        .status-amarelo { color: var(--warning); font-weight: bold; }

        #timer { font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <section class="camera-section">
            <div class="iframe-wrapper">
                <iframe src="https://cameras.cetsp.com.br/View/Cam.aspx" scrolling="no"></iframe>
            </div>
        </section>

        <section class="status-section">
            <div class="header">
                <h1>METRÔ / CPTM</h1>
                <div id="timer">Atualizando em: 60s</div>
            </div>
            <div id="status-container">Monitorando transporte...</div>
        </section>
    </div>

    <script>
        const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
        const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
        
        let countdown = 60;

        function getLineColor(name) {
            const colors = {
                'Azul': '#005599', 'Verde': '#008144', 'Vermelha': '#ef4135',
                'Prata': '#96999b', 'Amarela': '#ffce00', 'Lilás': '#a44e9b',
                'TURQUESA': '#00958b', 'CORAL': '#f6821f', 'SAFIRA': '#005599',
                'JADE': '#00a859', 'Diamante': '#919191', 'Esmeralda': '#00a98e', 'Ouro': '#d6a85e'
            };
            for (let key in colors) {
                if (name.includes(key)) return colors[key];
            }
            return '#fff';
        }

        async function loadData() {
            try {
                const response = await fetch(PROXY);
                const json = await response.json();
                const container = document.getElementById('status-container');
                container.innerHTML = '';

                json.data.forEach(group => {
                    group.listItem.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'line-card';
                        card.style.borderLeftColor = getLineColor(item.line);

                        const isNormal = item.status.toLowerCase().includes('normal');
                        const statusClass = isNormal ? 'status-verde' : 'status-amarelo';

                        card.innerHTML = `
                            <span class="line-name">${item.line}</span>
                            <span class="${statusClass}">${item.status.toUpperCase()}</span>
                        `;
                        container.appendChild(card);
                    });
                });
                countdown = 60;
            } catch (err) {
                document.getElementById('status-container').innerHTML = "Reconectando aos dados...";
            }
        }

        setInterval(() => {
            countdown--;
            document.getElementById('timer').innerText = `Atualizando em: ${countdown}s`;
            if (countdown <= 0) loadData();
        }, 1000);

        loadData();
    </script>
</body>
</html>

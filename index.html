<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CITY CAMERA SP - MOBILE PRO</title>
    <style>
        :root {
            --bg-color: #000;
            --accent: #38bdf8;
            --bar-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none; /* Impede o scroll da página toda no mobile */
        }

        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        .news-bar {
            height: 60px;
            background: var(--bar-bg);
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            border-top: 2px solid var(--accent);
            z-index: 1000;
        }

        .news-label {
            background: var(--accent);
            color: #000;
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 14px;
            white-space: nowrap;
        }

        marquee { font-size: 28px; font-weight: 900; }

        .camera-section {
            flex: 1;
            position: relative;
            background: #111;
            overflow: hidden;
        }

        /* O segredo: Esta camada invisível só aparece para permitir o arrasto */
        #touch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500;
            display: none; /* Começa desativado */
            background: rgba(56, 189, 248, 0.1);
            cursor: move;
        }

        #cam-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: center center;
            will-change: transform;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls {
            position: absolute;
            bottom: 10px; right: 10px;
            z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn {
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 44px;
        }

        .active-mode { background: #ff4444 !important; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <header class="news-bar">
            <div class="news-label">METRÔ/CPTM</div>
            <marquee id="m1" scrollamount="8"></marquee>
        </header>

        <section class="camera-section" id="viewport">
            <div id="touch-overlay"></div>
            
            <div id="cam-wrapper">
                <iframe src="https://transitoaovivo.com/transito-cetsp-2/"></iframe>
            </div>

            <div class="controls">
                <button class="btn" id="lock-btn" onclick="toggleLock()">AJUSTAR TELA</button>
                <button class="btn" onclick="changeZoom(0.2)">+</button>
                <button class="btn" onclick="changeZoom(-0.2)">-</button>
                <button class="btn" onclick="resetAll()">RST</button>
            </div>
        </section>

        <footer class="news-bar">
            <div class="news-label">AO VIVO</div>
            <marquee id="m2" scrollamount="8"></marquee>
        </footer >
    </div>

    <script>
        let scale = 1, posX = 0, posY = 0, isLocked = false;
        const wrapper = document.getElementById('cam-wrapper');
        const overlay = document.getElementById('touch-overlay');
        const lockBtn = document.getElementById('lock-btn');

        function toggleLock() {
            isLocked = !isLocked;
            overlay.style.display = isLocked ? 'block' : 'none';
            lockBtn.classList.toggle('active-mode');
            lockBtn.innerText = isLocked ? 'SALVAR POSIÇÃO' : 'AJUSTAR TELA';
        }

        function changeZoom(delta) {
            scale = Math.max(0.5, Math.min(5, scale + delta));
            update();
        }

        function resetAll() {
            scale = 1; posX = 0; posY = 0;
            update();
        }

        function update() {
            wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // Lógica Unificada (Mouse + Touch)
        let startX, startY, initialX, initialY;

        const startAction = (e) => {
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            initialX = posX;
            initialY = posY;
        };

        const moveAction = (e) => {
            if (e.type === 'touchmove') e.preventDefault();
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            posX = initialX + dx;
            posY = initialY + dy;
            update();
        };

        // Eventos para a Overlay
        overlay.addEventListener('mousedown', startAction);
        overlay.addEventListener('touchstart', startAction, {passive: false});

        window.addEventListener('mousemove', (e) => { if(isLocked && e.buttons === 1) moveAction(e); });
        overlay.addEventListener('touchmove', (e) => { if(isLocked) moveAction(e); }, {passive: false});

        // Marquee
        const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
        const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

        async function loadData() {
            try {
                const response = await fetch(PROXY);
                const json = await response.json();
                
                let txt = "";
                json.data.forEach(g => g.listItem.forEach(i => {
                    txt += ` <span style="margin-right:50px">${i.status.includes('Normal')?'🟢':'🟡'} ${i.line}: ${i.status.toUpperCase()}</span> `;
                }));

                const fullContent = txt + txt;

                // SÓ ATUALIZA SE O CONTEÚDO MUDOU (evita o reset da animação)
                if (fullContent !== lastStatusHash) {
                    document.getElementById('m1').innerHTML = fullContent;
                    document.getElementById('m2').innerHTML = fullContent;
                    lastStatusHash = fullContent;
                    console.log("Status atualizado!");
                }
            } catch(e) {
                console.error("Erro ao carregar dados do metrô:", e);
            }
        }
        
        loadData(); 
        setInterval(loadData, 60000); // Continua verificando a cada 1 minuto
    </script>
</body>
</html>

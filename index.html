    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CITY CAMERA SP - DASHBOARD PRO</title>
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.85);
                --text-main: #f8fafc;
                --accent: #38bdf8;
                --success: #22c55e;
                --warning: #fbbf24;
            }

            body, html {
                margin: 0; padding: 0; height: 100%;
                font-family: 'Segoe UI', Roboto, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                overflow: hidden;
            }

            .container { display: flex; height: 100vh; width: 100vw; }

            /* SEÇÃO ESQUERDA: DIVISÃO 50/50 */
            .camera-section {
                flex: 1.8; 
                border-right: 2px solid #334155;
                background: #111; /* Fundo levemente cinza para depurar se o iframe sumiu */
                display: flex;
                flex-direction: column;
            }

            .iframe-crop-container {
                position: relative;
                flex: 1;
                overflow: hidden; /* Mantém o corte */
                border-bottom: 2px solid #334155;
            }

            .wrapper-zoomable {
                position: absolute;
                left: 0;
                width: 100%;
                height: 1000px; /* Altura fixa grande para garantir que o conteúdo apareça */
                transform-origin: top left;
                transition: transform 0.2s ease;
            }

            /* Ajustes específicos de "Crop" para cada site */
            #cam-wrapper { top: -155px; }
            #vias-wrapper { top: -140px; } /* Diminuí o corte para evitar o fundo preto */

            iframe { 
                width: 100%; 
                height: 100%; 
                border: none;
                background: #fff; /* Se o site carregar, o fundo branco avisa antes da imagem vir */
            }

            .zoom-controls {
                position: absolute;
                bottom: 10px;
                left: 10px;
                z-index: 100;
                display: flex;
                align-items: center;
                gap: 5px;
                background: rgba(0,0,0,0.85);
                padding: 4px 8px;
                border-radius: 15px;
                border: 1px solid var(--accent);
            }

            button {
                background: var(--accent);
                border: none;
                color: #000;
                padding: 2px 8px;
                cursor: pointer;
                font-weight: bold;
                border-radius: 4px;
                font-size: 12px;
            }

            /* LADO DIREITO: STATUS (Mantive suas cores corrigidas) */
            .status-section {
                flex: 1;
                padding: 15px;
                overflow-y: auto;
                background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .header-title { text-align: center; color: var(--accent); margin: 0 0 10px 0; font-size: 1.2rem; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
            .line-card { background: var(--card-bg); padding: 10px 15px; border-radius: 6px; display: flex; justify-content: space-between; border-left: 6px solid transparent; font-size: 0.9rem; }
            .line-name { font-weight: bold; }
            .status-text { font-weight: bold; }
            #timer { text-align: center; font-size: 0.7rem; opacity: 0.6; }
        </style>
    </head>
    <body>

        <div class="container">
            <section class="camera-section">
                <div class="iframe-crop-container">
                    <div class="zoom-controls">
                        <button onclick="adjustZoom('cam', 0.1)">+</button>
                        <button onclick="adjustZoom('cam', -0.1)">-</button>
                        <button onclick="resetZoom('cam', -155)">RESET</button>
                    </div>
                    <div class="wrapper-zoomable" id="cam-wrapper">
                        <iframe src="https://transitoaovivo.com/transito-cetsp-2/"></iframe>
                    </div>
                </div>

                <div class="iframe-crop-container">
                    <div class="zoom-controls">
                        <button onclick="adjustZoom('vias', 0.1)">+</button>
                        <button onclick="adjustZoom('vias', -0.1)">-</button>
                        <button onclick="resetZoom('vias', -140)">RESET</button>
                    </div>
                    <div class="wrapper-zoomable" id="cam-wrapper">
                        <iframe src="https://transitoaovivo.com/transito-cetsp-2/"></iframe>
                    </div>
                </div>
            </section>

            <section class="status-section">
                <h2 class="header-title">Mobilidade SP</h2>
                <div id="timer">Sincronizando...</div>
                <div id="status-container"></div>
            </section>
        </div>

        <script>
            let zooms = { cam: 1.0, vias: 1.0 };

            function adjustZoom(id, delta) {
                zooms[id] = Math.max(0.3, Math.min(3.0, zooms[id] + delta));
                const el = document.getElementById(id + '-wrapper');
                el.style.transform = `scale(${zooms[id]})`;
                el.style.width = zooms[id] < 1 ? (100 / zooms[id]) + '%' : '100%';
            }

            function resetZoom(id, topPos) {
                zooms[id] = 1.0;
                const el = document.getElementById(id + '-wrapper');
                el.style.transform = `scale(1)`;
                el.style.width = '100%';
                el.style.top = topPos + 'px';
            }

            // --- LÓGICA DE CORES DAS LINHAS (CORRIGIDA) ---
            function getLineColor(name) {
                const colors = {
                    'Azul': '#005599', 'Verde': '#008144', 'Vermelha': '#ef4135',
                    'Amarela': '#ffce00', 'Lilás': '#a44e9b', 'Prata': '#96999b',
                    'TURQUESA': '#00958b', 'CORAL': '#f6821f', 'SAFIRA': '#005599',
                    'JADE': '#00a859', 'Diamante': '#919191', 'Esmeralda': '#00a98e', 'Ouro': '#d6a85e'
                };
                for (let key in colors) {
                    if (name.toUpperCase().includes(key.toUpperCase())) return colors[key];
                }
                return '#666';
            }

            const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
            const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
            let count = 60;

            async function loadData() {
                try {
                    const response = await fetch(PROXY);
                    const json = await response.json();
                    const container = document.getElementById('status-container');
                    container.innerHTML = '';

                    json.data.forEach(group => {
                        group.listItem.forEach(item => {
                            const card = document.createElement('div');
                            card.className = 'line-card';
                            card.style.borderLeftColor = getLineColor(item.line);
                            const isNormal = item.status.toLowerCase().includes('normal');
                            const colorStatus = isNormal ? 'var(--success)' : 'var(--warning)';

                            card.innerHTML = `
                                <span class="line-name">${item.line}</span>
                                <span class="status-text" style="color: ${colorStatus}">${item.status.toUpperCase()}</span>
                            `;
                            container.appendChild(card);
                        });
                    });
                    count = 60;
                } catch (err) { console.error(err); }
            }

            setInterval(() => {
                count--;
                document.getElementById('timer').innerText = `Atualizando em ${count}s`;
                if (count <= 0) loadData();
            }, 1000);

            loadData();
        </script>
    </body>
    </html>

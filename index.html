<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITY CAMERA SP - MODO NEWS 2X</title>
    <style>
        :root {
            --bg-color: #000;
            --accent: #38bdf8;
            --bar-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            overflow: hidden;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        /* BARRA ESTILO NEWS (USADA NO TOPO E NO RODAPÉ) */
        .news-bar {
            height: 70px; /* Aumentado para comportar o texto maior */
            background: var(--bar-bg);
            display: flex;
            align-items: center;
            border-bottom: 3px solid var(--accent);
            border-top: 3px solid var(--accent);
            z-index: 1000;
        }

        .news-label {
            background: var(--accent);
            color: #000;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 18px;
            white-space: nowrap;
            z-index: 1001;
            text-transform: uppercase;
        }

        marquee {
            font-size: 36px; /* 2X maior como solicitado */
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .marquee-item {
            margin-right: 80px;
            display: inline-block;
            letter-spacing: 1px;
        }

        /* SEÇÃO CENTRAL DAS CÂMERAS */
        .camera-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .iframe-crop-container {
            position: relative;
            flex: 1;
            overflow: hidden;
        
        }

        .wrapper-zoomable {
            display: flex;
            flex: 1;
            height: 100%;
            position: relative;
            transform-origin: top left;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .zoom-controls {
            position: absolute;
            bottom: 5px; right: 5px;
            z-index: 100;
            display: flex; gap: 5px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="news-bar">
            <div class="news-label">STATUS METRÔ/CPTM</div>
            <marquee scrollamount="10" class="status-marquee">
                Sincronizando dados de transporte...
            </marquee>
        </header>

        <section class="camera-section">
            <div class="iframe-crop-container">
                <div class="wrapper-zoomable" id="cam-wrapper">
                    <iframe src="https://transitoaovivo.com/transito-cetsp-2/"></iframe>
                </div>
            </div>
        </section>

        <footer class="news-bar">
            <div class="news-label">INFORMAÇÃO AO VIVO</div>
            <marquee scrollamount="10" class="status-marquee">
                Sincronizando dados de transporte...
            </marquee>
        </footer>
    </div>

    <script>
        const API_URL = 'https://www.tictrens.com.br/helper/line-statuses';
        const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

        async function loadData() {
            try {
                const response = await fetch(PROXY);
                const json = await response.json();
                const marquees = document.querySelectorAll('.status-marquee');
                
                let textStatus = "";

                json.data.forEach(group => {
                    group.listItem.forEach(item => {
                        const status = item.status.toUpperCase();
                        const color = item.status.toLowerCase().includes('normal') ? '🟢' : '🟡';
                        textStatus += `<span class="marquee-item">${color} ${item.line}: ${status}</span>`;
                    });
                });

                marquees.forEach(m => {
                    m.innerHTML = textStatus + textStatus;
                });
            } catch (err) { console.error(err); }
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
